<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кликер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; background: #f4f4f4; }
        h1 { font-size: 24px; }
        button {
            font-size: 20px; padding: 15px; margin-top: 20px;
            background-color: #0088cc; color: white; border: none; border-radius: 10px;
        }
    </style>
</head>
<body>
    <h1>Кликов: <span id="counter">0</span></h1>
    <button onclick="clickHandler()">Кликнуть!</button>

    <script>
        let clicks = 0;
        const counterElement = document.getElementById("counter");

        function clickHandler() {
            clicks++;
            counterElement.innerText = clicks;

            // Отправляем данные боту
            if (window.Telegram.WebApp) {
                Telegram.WebApp.sendData(JSON.stringify({ clicks }));
            }
        }

        Telegram.WebApp.expand(); // Разворачиваем на весь экран
    </script>
</body>
</html>
